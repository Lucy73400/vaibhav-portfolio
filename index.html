<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.ibb.co/4RG2kBWm/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/4RG2kBWm/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:wght@400;700&family=Inter+Tight:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
    <!-- Neue Montreal (display/quote font) and Satoshi (philosophy font) via Fontshare -->
    <link href="https://api.fontshare.com/v2/css?f[]=neue-montreal@300,400,500,700&f[]=satoshi@300,400,500&display=swap" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaibhav — The Creator</title>
  </head>
  <body>
    <!-- Gold scroll progress bar — fixed top, GPU-accelerated via transform -->
    <div id="scroll-progress" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* Scroll progress bar — vanilla JS, does not touch React state */
      (function () {
        var bar = document.getElementById('scroll-progress');
        if (!bar) return;
        function update() {
          var doc   = document.documentElement;
          var total = doc.scrollHeight - doc.clientHeight;
          var pct   = total > 0 ? (window.scrollY / total) * 100 : 0;
          /* scaleX is GPU-accelerated — no layout thrash */
          bar.style.transform = 'scaleX(' + (pct / 100) + ')';
        }
        window.addEventListener('scroll', update, { passive: true });
        update();
      })();
    </script>
  </body>
</html>
